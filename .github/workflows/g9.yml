name: G9 diário

on:
  schedule:
    # 07:17 Portugal (inverno/verão)
    - cron: '17 6 * * *'
    - cron: '17 7 * * *'

  workflow_dispatch:
    inputs:
      force_run:
        description: 'Forçar execução (1 = sim)'
        required: false
        default: '0'

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

          # Tarifário
          PERDAS: ${{ secrets.PERDAS }}
          FADEQ: ${{ secrets.FADEQ }}
          AC: ${{ secrets.AC }}
          GGS: ${{ secrets.GGS }}
          TAR_VAZIO: ${{ secrets.TAR_VAZIO }}
          TAR_FV: ${{ secrets.TAR_FV }}

          # E-REDES
          EREDES_CSV_URL: ${{ secrets.EREDES_CSV_URL }}

          # Force run manual
          FORCE_RUN: ${{ github.event.inputs.force_run || '0' }}

        run: python main.py
