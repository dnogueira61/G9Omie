name: G9 OMIE

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests openpyxl matplotlib

      - name: List files
        run: ls -R

      - name: Run main script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EREDES_CSV_URL: ${{ secrets.EREDES_CSV_URL }}
          PERDAS: ${{ vars.PERDAS }}
          FADEQ: ${{ vars.FADEQ }}
          AC: ${{ vars.AC }}
          GGS: ${{ vars.GGS }}
          TAR_VAZIO: ${{ vars.TAR_VAZIO }}
          TAR_FV: ${{ vars.TAR_FV }}
          FORCE_RUN: "0"
        run: python main.py
